name: Generate F1 Racecar Grid

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Using kdn251's fork which allows custom head images natively
      - name: Generate Racecar Grid
        uses: kdn251/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#333333&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
        env:
          # This specifies the URL to an image you want to use as the head!
          # For now, it's a standard racing flag emoji, but you can change this URL later.
          SNAKE_HEAD_IMG: "https://raw.githubusercontent.com/twitter/twemoji/master/assets/svg/1f3ce.svg"

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
